<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REALPOOH PROXY - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: linear-gradient(135deg, #F3EEF9 0%, #E8F1F5 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* หน้าจอมือถือจำลองให้เหมือนแอปจริง */
        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            /* ฉากหลังไล่สีละมุนแบบออร่าม่วง-ฟ้าตามรูป */
            background: radial-gradient(circle at 10% 10%, rgba(230, 215, 245, 0.7) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(215, 235, 245, 0.8) 0%, transparent 50%),
                        #F8F6FA;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
        }

        /* ---------------------------------- */
        /* 1. วงแหวนโหลดเดอร์แบบ Glassmorphism */
        /* ---------------------------------- */
        .loader-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 45px;
        }

        /* แผ่นกระจกทรงกลมตรงกลาง + เงาซ้อนนุ่ม ๆ */
        .glass-circle {
            position: absolute;
            width: 115px;
            height: 115px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(168, 129, 201, 0.2), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* อักษรย่อ RP */
        .brand-initial {
            font-size: 30px;
            font-weight: 750;
            color: #6C5299;
            letter-spacing: -0.5px;
        }

        /* SVG วงแหวนสถานะ */
        .svg-ring {
            position: absolute;
            transform: rotate(-90deg);
            z-index: 1;
        }

        .ring-bg {
            fill: none;
            stroke: #EBE6F2;
            stroke-width: 7;
        }

        .ring-flow {
            fill: none;
            stroke: url(#gradientColors);
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.08s linear;
        }

        /* ---------------------------------- */
        /* 2. ส่วนของชื่อแบรนด์ */
        /* ---------------------------------- */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: #3A394D;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .main-title span {
            color: #8C61C7; /* สีม่วงเด่นที่คำว่า PROXY */
        }

        .sub-title {
            font-size: 11px;
            color: #9C9BB3;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* ---------------------------------- */
        /* 3. รายการเช็คสถานะการโหลด */
        /* ---------------------------------- */
        .status-box {
            width: 100%;
            max-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 50px;
        }

        .status-row {
            display: flex;
            align-items: center;
            font-size: 15px;
            color: #8A899C;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* วงกลมไอคอนเปล่า */
        .check-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #D5D2E2;
            margin-right: 16px;
            position: relative;
            background: #FFF;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* สไตล์เมื่อโหลดสเต็ปนั้นผ่านแล้ว */
        .status-row.active {
            color: #4B495E;
        }

        .status-row.active .check-dot {
            background-color: #E2F6E7;
            border-color: #4CD080;
        }

        /* ใส่เครื่องหมายติ๊กถูกสีเขียว */
        .status-row.active .check-dot::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid #4CD080;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* ---------------------------------- */
        /* 4. แถบความคืบหน้า (Progress Bar) */
        /* ---------------------------------- */
        .progress-wrapper {
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        .bar-outline {
            width: 100%;
            height: 6px;
            background-color: #E5E2F0;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8C61C7, #A881C9);
            border-radius: 10px;
            transition: width 0.08s linear;
        }

        .counter-num {
            font-size: 13px;
            color: #9C9BB3;
            font-weight: 600;
        }

        /* ---------------------------------- */
        /* 5. เมนู 3 ตัวเลือก (จะเด้งมาหลัง 100%) */
        /* ---------------------------------- */
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F8F6FA;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .menu-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .menu-title {
            font-size: 24px;
            font-weight: 800;
            color: #3A394D;
            margin-bottom: 30px;
            text-align: center;
        }

        .menu-title span {
            color: #8C61C7;
        }

        .menu-btn-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 300px;
        }

        .menu-btn {
            background: #FFFFFF;
            border: 1px solid #E5E2F0;
            color: #4B495E;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(168, 129, 201, 0.05);
        }

        .menu-btn:hover {
            border-color: #8C61C7;
            background: #FDFBFF;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(140, 97, 199, 0.15);
        }

        .menu-btn::after {
            content: '→';
            color: #9C9BB3;
            font-size: 16px;
            transition: transform 0.25s ease;
        }

        .menu-btn:hover::after {
            color: #8C61C7;
            transform: translateX(3px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 1. วงแหวนโหลดเดอร์กลางจอ -->
        <div class="loader-wrapper">
            <div class="glass-circle">
                <span class="brand-initial">RP</span>
            </div>
            <svg class="svg-ring" width="144" height="144" viewBox="0 0 150 150">
                <defs>
                    <!-- ไล่เฉดสีม่วงไปฟ้าตามต้นฉบับรูปภาพ -->
                    <linearGradient id="gradientColors" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#8C61C7" />
                        <stop offset="100%" stop-color="#54D4CE" />
                    </linearGradient>
                </defs>
                <circle class="ring-bg" cx="75" cy="75" r="65"></circle>
                <circle class="ring-flow" id="ring-progress" cx="75" cy="75" r="65"></circle>
            </svg>
        </div>

        <!-- 2. ชื่อระบบ -->
        <div class="brand-section">
            <div class="main-title">REALPOOH <span>PROXY</span></div>
            <div class="sub-title">PREMIUM PROXY ACCESS</div>
        </div>

        <!-- 3. รายการสถานะ -->
        <div class="status-box">
            <div class="status-row" id="step-1">
                <div class="check-dot"></div>
                เชื่อมต่อเซิร์ฟเวอร์
            </div>
            <div class="status-row" id="step-2">
                <div class="check-dot"></div>
                ตรวจสอบความปลอดภัย
            </div>
            <div class="status-row" id="step-3">
                <div class="check-dot"></div>
                โหลดข้อมูล Proxy
            </div>
            <div class="status-row" id="step-4">
                <div class="check-dot"></div>
                พร้อมใช้งาน
            </div>
        </div>

        <!-- 4. แถบความคืบหน้าด้านล่าง -->
        <div class="progress-wrapper">
            <div class="bar-outline">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
            <div class="counter-num" id="counter-num">0%</div>
        </div>

        <!-- 5. หน้าจอเมนู 3 ตัวเลือกที่จะเด้งสไลด์ขึ้นมาเมื่อครบ 100% -->
        <div class="menu-overlay" id="menu-overlay">
            <div class="menu-title">REALPOOH <span>PROXY</span></div>
            <div class="menu-btn-list">
                <button class="menu-btn" onclick="actionMenu('Menu 1')">เข้าสู่ระบบระบบหลัก</button>
                <button class="menu-btn" onclick="actionMenu('Menu 2')">เลือกเซิร์ฟเวอร์ Proxy</button>
                <button class="menu-btn" onclick="actionMenu('Menu 3')">ตั้งค่าการเชื่อมต่อ</button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const ring = document.getElementById("ring-progress");
            const barFill = document.getElementById("bar-fill");
            const counterNum = document.getElementById("counter-num");
            const menuOverlay = document.getElementById("menu-overlay");
            
            let percent = 0;
            // ความยาวเส้นรอบวงคำนวณจาก 2 * PI * r (2 * 3.14159 * 65 = ~408.4)
            const circumference = 2 * Math.PI * 65; 
            
            // ตั้งค่าเริ่มต้นของวงแหวนให้ว่างเปล่า
            ring.style.strokeDasharray = circumference;
            ring.style.strokeDashoffset = circumference;

            const steps = [
                { limit: 25, id: "step-1" },
                { limit: 50, id: "step-2" },
                { limit: 75, id: "step-3" },
                { limit: 100, id: "step-4" }
            ];

            const interval = setInterval(() => {
                // สุ่มเพิ่มทีละ 1 ถึง 3 เปอร์เซ็นต์เพิ่มความสมจริง
                percent += Math.floor(Math.random() * 3) + 1;
                
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                    
                    // เมื่อโหลดเสร็จสมบูรณ์ หน่วงเวลาสั้น ๆ แล้วเปิดหน้าเมนูขึ้นมา
                    setTimeout(() => {
                        menuOverlay.classList.add("show");
                    }, 600);
                }

                // อัปเดตข้อความตัวเลขและแถบโหลด
                counterNum.innerText = percent + "%";
                barFill.style.width = percent + "%";

                // คำนวณขยับอนิเมชันวงแหวน
                const offset = circumference - (percent / 100) * circumference;
                ring.style.strokeDashoffset = offset;

                // ติ๊กถูกสถานะแต่ละขั้น
                steps.forEach(step => {
                    if (percent >= step.limit) {
                        document.getElementById(step.id).classList.add("active");
                    }
                });

            }, 40); // ปรับความเร็วในการโหลดตรงนี้ (ค่าน้อยจะโหลดไวขึ้น)
        });

        function actionMenu(name) {
            alert("คุณได้เลือกใช้งาน: " + name);
            // สามารถเปลี่ยนเป็นลิงก์ไปหน้าอื่นได้ เช่น window.location.href = 'หน้าเว็บของคุณ.html';
        }
    </script>
</body>
</html>
