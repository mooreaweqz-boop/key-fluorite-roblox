<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRP CS PROXY - Loading</title>
    <style>
        /* ตั้งค่าพื้นฐานให้เหมือนหน้าจอแอป */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #F6F3F9; /* สีพื้นหลังม่วงอ่อนตามรูป */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* ซ่อน scrollbar */
        }

        /* คอนเทนเนอร์หลักจำลองหน้าจอโทรศัพท์ */
        .app-container {
            width: 100%;
            max-width: 414px; /* ขนาด iPhone Max */
            height: 100vh;
            background: linear-gradient(180deg, #FFFFFF 0%, #F6F3F9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
        }

        /* ---------------------------------- */
        /* ส่วนวงกลมโหลดตรงกลาง */
        /* ---------------------------------- */
        .loader-circle-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        /* วงกลมพื้นหลังสีเทา */
        .circle-bg {
            fill: none;
            stroke: #EAEAEF;
            stroke-width: 10;
        }

        /* วงกลมความก้าวหน้าสีม่วง/ฟ้า */
        .circle-progress {
            fill: none;
            stroke: #A881C9; /* สีม่วงหลัก */
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 440; /* เส้นรอบวง */
            stroke-dashoffset: 440; /* เริ่มต้นที่ 0% */
            transition: stroke-dashoffset 0.05s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* ตัวอักษร MR ตรงกลาง */
        .mr-text {
            position: absolute;
            font-size: 32px;
            font-weight: 700;
            color: #7A57A1;
            letter-spacing: 1px;
        }

        /* ---------------------------------- */
        /* ส่วนข้อความหัวข้อ */
        /* ---------------------------------- */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 24px;
            font-weight: 700;
            color: #2D2D3A;
            margin-bottom: 5px;
        }

        .main-title span {
            color: #7A57A1; /* สีม่วงที่คำว่า PROXY */
        }

        .sub-title {
            font-size: 14px;
            color: #8E8E9F;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* ---------------------------------- */
        /* ส่วนรายการสถานะ (Status List) */
        /* ---------------------------------- */
        .status-list {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .status-item {
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #555;
            transition: color 0.3s ease;
        }

        /* วงกลมติ๊กถูก (Icon) */
        .status-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #EAEAEF; /* สถานะยังไม่เสร็จ */
            margin-right: 15px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* สไตล์เมื่อรายการเสร็จสิ้น (Done) */
        .status-item.done {
            color: #A881C9; /* ข้อความเปลี่ยนสี */
        }

        .status-item.done .status-icon {
            background-color: #D6EBDC; /* พื้นเขียวอ่อน */
            border-color: #54B463; /* ขอบเขียว */
        }

        /* เครื่องหมายติ๊กถูก (Checkmark) */
        .status-item.done .status-icon::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #54B463;
            font-size: 12px;
            font-weight: 900;
        }

        /* ---------------------------------- */
        /* ส่วนแถบโหลดและตัวเลข (Progress Bar) */
        /* ---------------------------------- */
        .progress-section {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        /* แถบโหลดพื้นหลัง */
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #EAEAEF;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        /* แถบโหลดจริงสีม่วง */
        .progress-bar-fill {
            height: 100%;
            width: 0%; /* เริ่มต้น 0 */
            background-color: #A881C9;
            border-radius: 3px;
            transition: width 0.05s linear;
        }

        /* ตัวเลขเปอร์เซ็นต์ */
        .percent-text {
            font-size: 14px;
            color: #8E8E9F;
            font-weight: 600;
        }

        /* ---------------------------------- */
        /* หน้าจอหลังโหลดเสร็จ (ตัวอย่าง) */
        /* ---------------------------------- */
        #main-content {
            display: none; /* ซ่อนไว้ก่อน */
            width: 100%;
            text-align: center;
            padding: 40px;
        }

        #main-content.show {
            display: block;
        }
    </style>
</head>
<body>

    <!-- 1. ส่วนของหน้า Loading ที่จำลองจากรูป image_1.png -->
    <div class="app-container" id="loading-screen">
        
        <!-- วงกลมโหลดตรงกลาง -->
        <div class="loader-circle-container">
            <svg width="150" height="150" viewBox="0 0 150 150">
                <circle class="circle-bg" cx="75" cy="75" r="70"></circle>
                <circle class="circle-progress" id="circle-progress" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="mr-text">MR</div>
        </div>

        <!-- หัวข้อข้อความ -->
        <div class="header-section">
            <div class="main-title">MRP CS <span>PROXY</span></div>
            <div class="sub-title">PREMIUM PROXY ACCESS</div>
        </div>

        <!-- รายการสถานะ -->
        <div class="status-list">
            <div class="status-item" id="status-1">
                <div class="status-icon"></div>
                เชื่อมต่อเซิร์ฟเวอร์
            </div>
            <div class="status-item" id="status-2">
                <div class="status-icon"></div>
                ตรวจสอบความปลอดภัย
            </div>
            <div class="status-item" id="status-3">
                <div class="status-icon"></div>
                โหลดข้อมูล Proxy
            </div>
            <div class="status-item" id="status-4">
                <div class="status-icon"></div>
                พร้อมใช้งาน
            </div>
        </div>

        <!-- แถบโหลดและตัวเลขเปอร์เซ็นต์ -->
        <div class="progress-section">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
            <div class="percent-text" id="percent-text">0%</div>
        </div>

    </div>

    <!-- 2. ส่วนของเนื้อหาหลักหลังโหลดเสร็จ (คุณสามารถใส่โค้ดหน้าเว็บจริงที่นี่) -->
    <div id="main-content">
        <h1>ยินดีต้อนรับ!</h1>
        <p>เชื่อมต่อ Proxy สำเร็จแล้ว พร้อมใช้งานครับ</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ดึง Element ต่างๆ
            const circle = document.getElementById("circle-progress");
            const progressBarFill = document.getElementById("progress-bar-fill");
            const percentText = document.getElementById("percent-text");
            const loadingScreen = document.getElementById("loading-screen");
            const mainContent = document.getElementById("main-content");
            
            // การตั้งค่าความเร็วและรายการสถานะ
            let progress = 0;
            const statusItems = [
                { percent: 25, id: "status-1" },
                { percent: 50, id: "status-2" },
                { percent: 75, id: "status-3" },
                { percent: 100, id: "status-4" }
            ];
            
            // ฟังก์ชันจำลองการโหลด
            const loadInterval = setInterval(() => {
                // สุ่มเพิ่มความคืบหน้าทีละนิดเพื่อให้ดูสมจริง
                progress += Math.floor(Math.random() * 3) + 1; 
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadInterval); // หยุดเมื่อครบ 100
                    
                    // เมื่อครบ 100% หน่วงเวลาแป๊บนึงแล้วเปลี่ยนหน้า
                    setTimeout(() => {
                        loadingScreen.style.display = 'none'; // ซ่อนหน้าโหลด
                        mainContent.classList.add('show'); // แสดงหน้าหลัก
                        document.body.style.backgroundColor = '#FFFFFF'; // เปลี่ยนพื้นหลังหน้าหลัก
                    }, 800); 
                }
                
                // --- อัปเดต UI ---
                
                // 1. อัปเดตตัวเลข % และแถบโหลดด้านล่าง
                percentText.innerText = progress + "%";
                progressBarFill.style.width = progress + "%";
                
                // 2. อัปเดตวงกลมโหลดตรงกลาง
                const offset = 440 - (progress / 100) * 440; // คำนวณความยาวเส้น
                circle.style.strokeDashoffset = offset;
                
                // 3. ตรวจสอบและติ๊กถูกรายการสถานะตาม %
                statusItems.forEach(item => {
                    if (progress >= item.percent) {
                        document.getElementById(item.id).classList.add("done");
                    }
                });
                
            }, 50); // ความเร็วในการอัปเดต (ยิ่งน้อยยิ่งเร็ว)
        });
    </script>

</body>
</html>
