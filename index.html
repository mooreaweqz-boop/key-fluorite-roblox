<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALPOOH PROXY</title>
    <!-- นำเข้าฟอนต์ Itim สุดน่ารัก -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            font-family: 'Itim', cursive, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        .card { 
            background-color: #0d0d0d; border: 2px solid #3a0b0b; border-radius: 35px; 
            padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; 
            box-shadow: 0 0 25px rgba(255, 50, 50, 0.2); 
        }
        .logo-container { 
            width: 120px; height: 120px; margin: 0 auto 20px auto; 
            border-radius: 50%; border: 3px solid #ff3333; 
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            display: flex; justify-content: center; align-items: center; 
            background-color: #141414;
            overflow: hidden;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .title { color: #fff; font-size: 30px; font-weight: bold; margin: 0 0 5px 0; letter-spacing: 1px; }
        .title span { color: #ff3333; }
        .subtitle { color: #d4af37; font-size: 15px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label { color: #aaa; font-size: 14px; margin-bottom: 8px; display: block; padding-left: 5px; }
        .input-field { 
            width: 100%; background-color: #141414; border: 1px solid #262626; 
            border-radius: 18px; padding: 15px; color: #fff; font-size: 18px; 
            text-align: center; transition: 0.3s;
        }
        .input-field:focus { border-color: #ff3333; outline: none; }
        .submit-btn { 
            width: 100%; background: linear-gradient(180deg, #ff3333 0%, #cc0000 100%); 
            border: none; border-radius: 20px; padding: 15px; color: white; 
            font-size: 20px; cursor: pointer; transition: 0.2s; margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.3);
            font-family: 'Itim', cursive, sans-serif;
        }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(255, 51, 51, 0.5); }
        .submit-btn:active { transform: scale(0.98); }
        
        #resultArea { 
            margin-top: 25px; color: #fff; display: none; padding: 20px; 
            border-radius: 20px; background: #1a0505; border: 1.5px dashed #ff3333;
            text-align: left;
            /* เพิ่มความสูงสูงสุดและ Scrollbar กรณีสร้างคีย์เยอะๆ */
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* ปรับแต่ง Scrollbar ให้สวยเข้ากับธีม */
        #resultArea::-webkit-scrollbar { width: 8px; }
        #resultArea::-webkit-scrollbar-track { background: #1a0505; border-radius: 10px; }
        #resultArea::-webkit-scrollbar-thumb { background: #ff3333; border-radius: 10px; }
        
        .key-list {
            margin: 10px 0;
            padding-left: 0;
            list-style: none;
        }
        .key-item {
            background: #2b0b0b;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 18px;
            color: #ffeb3b;
            word-break: break-all;
            border: 1px solid #441111;
        }
        
        .copy-btn {
            width: 100%; background: #2b0b0b; border: 1px dashed #ff3333; 
            border-radius: 15px; padding: 12px; color: #ffeb3b; 
            font-size: 16px; cursor: pointer; transition: 0.2s; 
            margin-top: 15px; font-family: 'Itim', cursive, sans-serif;
        }
        .copy-btn:hover { background: #441111; }
        
        .error-msg { color: #ff3333; font-size: 14px; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://cdn.discordapp.com/attachments/1528247158069792863/1528249908845351042/IMG_1880.png?ex=6a5d9d23&is=6a5c4ba3&hm=1258cef0d3504e6bfe263a18198e3ae78fd2238c6bd69536c54b77deba2388a1&" alt="REALPOOH LOGO">
        </div>
        <h1 class="title">REALPOOH <span>PROXY</span></h1>
        <div class="subtitle">✨ ยินดีต้อนรับ! กรุณาเลือกจำนวนที่ต้องการนะ ✨</div>

        <div class="input-group">
            <label class="input-label">📅 เลือกจำนวนวันที่ต้องการรับคีย์ (1 - 9999 วัน)</label>
            <input type="number" id="daysInput" min="1" max="9999" value="30" class="input-field">
        </div>

        <div class="input-group">
            <label class="input-label">🔑 ปรับจำนวนคีย์ที่ต้องการสร้าง</label>
            <!-- ปลดลิมิต max ออก สามารถใส่เลขเยอะๆ ได้เลย -->
            <input type="number" id="amountInput" min="1" value="1" class="input-field">
        </div>

        <button class="submit-btn" onclick="generateKey()">รับคีย์ 🚀</button>

        <div id="resultArea">
            <div style="font-weight: bold; color: #ff3333;">🎉 รับคีย์สำเร็จแล้วงับ!</div>
            <ul id="keyList" class="key-list"></ul>
            <div id="keyDetails" style="font-size: 14px; color: #bbb; margin-top: 10px; border-top: 1px dashed #441111; padding-top: 5px;"></div>
            
            <button class="copy-btn" id="copyBtn" onclick="copyAllKeys()">📋 คัดลอกคีย์ทั้งหมด</button>
        </div>

        <div class="error-msg" id="errorMsg" style="display:none;">กรุณาระบุข้อมูลให้ถูกต้องนะงับ! 😭</div>
    </div>

    <script>
        // ใช้ Set ในหน่วยความจำเพื่อให้ดึงข้อมูลและตรวจสอบความซ้ำได้เร็วขึ้น
        const usedKeysTracker = new Set(JSON.parse(localStorage.getItem('poohProxyKeys')) || []);
        let currentGeneratedKeys = [];

        function generateKey() {
            const days = document.getElementById('daysInput').value;
            const amount = parseInt(document.getElementById('amountInput').value);
            const resultArea = document.getElementById('resultArea');
            const keyList = document.getElementById('keyList');
            const keyDetails = document.getElementById('keyDetails');
            const errorMsg = document.getElementById('errorMsg');
            const copyBtn = document.getElementById('copyBtn');

            // ล้างข้อมูลหน้าจอ เตรียมรับชุดใหม่
            keyList.innerHTML = '';
            currentGeneratedKeys = [];
            resultArea.style.display = 'none';
            errorMsg.style.display = 'none';
            copyBtn.innerText = '📋 คัดลอกคีย์ทั้งหมด';

            // ตรวจสอบค่าความถูกต้อง
            if (!days || !amount || amount < 1 || days < 1) {
                errorMsg.style.display = 'block';
                return;
            }

            // ใช้ DocumentFragment ช่วยให้เบราว์เซอร์ไม่ต้องโหลดซ้ำหลายรอบเวลาสร้างคีย์เยอะๆ
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < amount; i++) {
                let newKey = '';
                let isDuplicate = true;

                while (isDuplicate) {
                    // ใช้ตัวเลขสุ่มผสมหลายชั้นเพื่อให้ได้คีย์ที่ไม่ซ้ำกัน 100%
                    const timeStamp = Date.now().toString().slice(-4);
                    const randomNum = Math.floor(10000 + Math.random() * 90000); 
                    
                    newKey = `pooh-${days}day-proxy${timeStamp}${randomNum}`;
                    
                    if (!usedKeysTracker.has(newKey)) {
                        usedKeysTracker.add(newKey);
                        isDuplicate = false;
                    }
                }

                // สร้างแท็ก <li>
                const li = document.createElement('li');
                li.className = 'key-item';
                li.innerText = `🔑 ${newKey}`;
                fragment.appendChild(li);
                
                // เก็บใส่กล่องสำหรับปุ่มกดคัดลอก
                currentGeneratedKeys.push(newKey);
            }

            // แสดงผลรวดเดียว
            keyList.appendChild(fragment);

            // เซฟคีย์ใหม่ลงเบราว์เซอร์
            localStorage.setItem('poohProxyKeys', JSON.stringify(Array.from(usedKeysTracker)));

            keyDetails.innerText = `อายุการใช้งาน: ${days} วัน | ได้รับทั้งหมด: ${amount} คีย์`;
            resultArea.style.display = 'block';
        }

        function copyAllKeys() {
            if (currentGeneratedKeys.length === 0) return;

            const textToCopy = currentGeneratedKeys.join('\n');

            navigator.clipboard.writeText(textToCopy).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = '✅ คัดลอกเรียบร้อยแล้ว!';
                
                setTimeout(() => {
                    copyBtn.innerText = '📋 คัดลอกคีย์ทั้งหมด';
                }, 2000);
            }).catch(err => {
                console.error('คัดลอกไม่สำเร็จ: ', err);
            });
        }
    </script>
</body>
</html>
